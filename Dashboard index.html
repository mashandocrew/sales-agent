<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>LinkedIn Agent</title>
<style>
:root {
  --bg: #0a0a0a; --card: #141414; --border: #1e1e1e;
  --text: #e5e5e5; --muted: #737373;
  --green: #10b981; --blue: #3b82f6; --yellow: #f59e0b;
  --red: #ef4444; --purple: #8b5cf6; --orange: #f97316;
  --radius: 8px; --font: system-ui,-apple-system,sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--font);background:var(--bg);color:var(--text);min-height:100vh}

/* ── Setup overlay ── */
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.88);z-index:999;align-items:center;justify-content:center;padding:1rem}
.overlay.show{display:flex}
.setup-box{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:2rem;width:100%;max-width:460px}
.setup-box h2{color:var(--green);margin-bottom:.375rem;font-size:1.1rem}
.setup-box p{color:var(--muted);font-size:.8rem;margin-bottom:1.25rem;line-height:1.5}

/* ── Modal ── */
.modal-box{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);width:100%;max-width:580px;margin:auto;max-height:90vh;display:flex;flex-direction:column}
.modal-head{display:flex;align-items:center;justify-content:space-between;padding:.875rem 1rem;border-bottom:1px solid var(--border);flex-shrink:0}
.modal-head h3{font-size:.95rem;font-weight:600}
.modal-close{background:none;border:none;color:var(--muted);font-size:1.1rem;cursor:pointer;line-height:1;padding:0}
.modal-body{padding:1rem;overflow-y:auto}

/* ── Header ── */
.app-header{background:var(--card);border-bottom:1px solid var(--border);padding:.625rem 1rem;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:90}
.header-brand{font-size:.95rem;font-weight:600;color:var(--green)}
.header-sub{font-size:.7rem;color:var(--muted);margin-top:.1rem}
.header-right{display:flex;gap:.375rem}

/* ── Tabs ── */
.tab-nav{display:flex;overflow-x:auto;background:var(--card);border-bottom:1px solid var(--border);position:sticky;top:49px;z-index:89;scrollbar-width:none}
.tab-nav::-webkit-scrollbar{display:none}
.tab-btn{flex-shrink:0;padding:.625rem .875rem;background:none;border:none;border-bottom:2px solid transparent;color:var(--muted);font-size:.78rem;font-weight:500;cursor:pointer;white-space:nowrap;transition:color .15s,border-color .15s}
.tab-btn.active{color:var(--green);border-bottom-color:var(--green)}
.tab-btn:hover:not(.active){color:var(--text)}
.tab-pane{display:none;padding:1rem}
.tab-pane.active{display:block}

/* ── Forms ── */
.form-group{margin-bottom:.875rem}
label{display:block;font-size:.75rem;color:var(--muted);margin-bottom:.3rem}
input[type=text],input[type=date],select,textarea{width:100%;background:#1a1a1a;border:1px solid var(--border);border-radius:var(--radius);color:var(--text);padding:.55rem .7rem;font-size:.85rem;font-family:var(--font);outline:none;transition:border-color .15s}
input:focus,select:focus,textarea:focus{border-color:var(--blue)}
textarea{resize:vertical;min-height:110px}
select option{background:#1a1a1a}

/* ── Buttons ── */
.btn{display:inline-flex;align-items:center;gap:.3rem;padding:.45rem .8rem;border:none;border-radius:var(--radius);font-size:.78rem;font-weight:500;cursor:pointer;transition:opacity .15s;white-space:nowrap;font-family:var(--font)}
.btn:hover{opacity:.82}.btn:active{opacity:.65}
.btn-primary{background:var(--blue);color:#fff}
.btn-success{background:var(--green);color:#fff}
.btn-danger{background:var(--red);color:#fff}
.btn-ghost{background:#1e1e1e;color:var(--text)}
.btn-sm{padding:.3rem .55rem;font-size:.72rem}
.btn-full{width:100%;justify-content:center}

/* ── Cards ── */
.card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:.875rem;margin-bottom:.75rem}

/* ── Badges ── */
.badge{display:inline-flex;align-items:center;padding:.15rem .45rem;border-radius:9999px;font-size:.68rem;font-weight:600;background:#1e1e1e;color:var(--muted)}
.bg{background:rgba(16,185,129,.13);color:var(--green)}
.bb{background:rgba(59,130,246,.13);color:var(--blue)}
.by{background:rgba(245,158,11,.13);color:var(--yellow)}
.br{background:rgba(239,68,68,.13);color:var(--red)}
.bp{background:rgba(139,92,246,.13);color:var(--purple)}

/* ── Message cards ── */
.msg-card{position:relative}
.msg-header{margin-bottom:.5rem}
.msg-name{font-weight:600;font-size:.9rem}
.msg-role{color:var(--muted);font-size:.78rem;margin-bottom:.4rem}
.msg-badges{display:flex;flex-wrap:wrap;gap:.3rem;margin-bottom:.6rem}
.msg-body{background:#0d0d0d;border:1px solid var(--border);border-radius:6px;padding:.7rem;font-size:.83rem;line-height:1.65;white-space:pre-wrap;word-break:break-word;margin-bottom:.6rem}
.msg-footer{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:.4rem}
.char-info{font-size:.72rem;color:var(--muted)}
.char-over{color:var(--red)}
.msg-actions{display:flex;gap:.35rem;flex-wrap:wrap}

/* ── Kanban ── */
.kanban-scroll{overflow-x:auto;padding-bottom:.5rem;-webkit-overflow-scrolling:touch}
.kanban{display:flex;gap:.75rem;min-width:max-content;align-items:flex-start}
.k-col{width:250px;flex-shrink:0}
.k-col-head{padding:.55rem .7rem;border-radius:6px;margin-bottom:.5rem;font-size:.78rem;font-weight:600;display:flex;align-items:center;justify-content:space-between}
.k-cnt{background:rgba(0,0,0,.35);border-radius:9999px;padding:.1rem .45rem;font-size:.68rem}
.k-cards{min-height:60px}
.k-card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:.7rem;margin-bottom:.45rem}
.k-name{font-weight:600;font-size:.83rem;margin-bottom:.15rem}
.k-co{color:var(--muted);font-size:.73rem;margin-bottom:.4rem}
.k-acts{display:flex;gap:.3rem;flex-wrap:wrap}

/* ── Table ── */
.filters{display:grid;grid-template-columns:1fr 1fr;gap:.45rem;margin-bottom:.875rem}
.filter-full{grid-column:1/-1}
.tbl-wrap{overflow-x:auto}
table{width:100%;border-collapse:collapse;font-size:.78rem;min-width:520px}
th{text-align:left;padding:.55rem .65rem;color:var(--muted);font-weight:500;border-bottom:1px solid var(--border);white-space:nowrap;cursor:pointer}
th:hover{color:var(--text)}
td{padding:.55rem .65rem;border-bottom:1px solid var(--border)}
tr.row:hover td{background:#181818;cursor:pointer}

/* ── KPIs ── */
.date-btns{display:flex;gap:.35rem;flex-wrap:wrap;margin-bottom:.75rem}
.dbt{padding:.3rem .7rem;border-radius:9999px;border:1px solid var(--border);background:none;color:var(--muted);font-size:.73rem;cursor:pointer;font-family:var(--font)}
.dbt.active{background:var(--green);color:#fff;border-color:var(--green)}
.date-range{display:flex;gap:.45rem;align-items:center;flex-wrap:wrap;margin-bottom:1rem}
.date-range input{width:136px}
.kpi-grid{display:grid;grid-template-columns:1fr 1fr;gap:.65rem;margin-bottom:1.25rem}
.kpi-card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:.875rem}
.kpi-v{font-size:1.75rem;font-weight:700;line-height:1;margin-bottom:.2rem}
.kpi-l{font-size:.72rem;color:var(--muted)}
.kpi-s{font-size:.68rem;color:var(--muted);margin-top:.2rem}
.chart-title{font-size:.78rem;font-weight:600;color:var(--muted);margin-bottom:.65rem}
.bars{display:flex;align-items:flex-end;gap:.3rem;height:72px;margin-bottom:1.25rem}
.bar-col{flex:1;display:flex;flex-direction:column;align-items:center;gap:.2rem}
.bar-fill{width:100%;background:var(--blue);border-radius:3px 3px 0 0;min-height:2px;transition:height .3s}
.bar-lbl{font-size:.62rem;color:var(--muted)}
.funnel-wrap{margin-bottom:1.25rem}
.funnel-row{display:flex;align-items:center;gap:.6rem;margin-bottom:.4rem}
.f-label{font-size:.73rem;color:var(--muted);width:105px;flex-shrink:0}
.f-bar-wrap{flex:1}
.f-bar{height:26px;border-radius:4px;display:flex;align-items:center;padding:0 .5rem;font-size:.72rem;font-weight:600;color:#fff;min-width:28px;transition:width .4s}
.f-pct{font-size:.68rem;color:var(--muted);width:32px;text-align:right;flex-shrink:0}

/* ── Reports ── */
.report-card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:.875rem;margin-bottom:.65rem}
.report-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:.6rem}
.metric-chips{display:flex;flex-wrap:wrap;gap:.4rem}
.m-chip{background:#1a1a1a;border-radius:6px;padding:.3rem .55rem}
.m-chip-l{font-size:.67rem;color:var(--muted)}
.m-chip-v{font-size:.85rem;font-weight:600}

/* ── Import ── */
.import-sec{margin-bottom:1.5rem}
.import-sec-title{font-size:.83rem;font-weight:600;margin-bottom:.75rem;padding-bottom:.45rem;border-bottom:1px solid var(--border)}
.preview-info{background:rgba(59,130,246,.1);border:1px solid rgba(59,130,246,.2);border-radius:var(--radius);padding:.65rem .875rem;font-size:.78rem;color:var(--blue);margin-bottom:.65rem}
.preview-info.success{background:rgba(16,185,129,.1);border-color:rgba(16,185,129,.2);color:var(--green)}

/* ── Toast ── */
.toast-wrap{position:fixed;bottom:1rem;right:1rem;z-index:9999;display:flex;flex-direction:column;gap:.4rem;pointer-events:none}
.toast{background:#1e1e1e;border:1px solid var(--border);border-radius:var(--radius);padding:.65rem .9rem;font-size:.82rem;max-width:272px;animation:tin .2s ease;pointer-events:auto}
.toast.s{border-left:3px solid var(--green)}.toast.e{border-left:3px solid var(--red)}.toast.i{border-left:3px solid var(--blue)}
@keyframes tin{from{transform:translateX(110%);opacity:0}to{transform:translateX(0);opacity:1}}

/* ── Misc ── */
.loading{display:flex;align-items:center;justify-content:center;padding:2.5rem;color:var(--muted);font-size:.83rem;gap:.5rem}
.spin{width:17px;height:17px;border:2px solid var(--border);border-top-color:var(--green);border-radius:50%;animation:sp .6s linear infinite}
@keyframes sp{to{transform:rotate(360deg)}}
.empty{text-align:center;padding:2.5rem 1rem;color:var(--muted);font-size:.83rem;line-height:1.6}
.sec-label{font-size:.68rem;font-weight:600;text-transform:uppercase;letter-spacing:.07em;color:var(--muted);margin:1rem 0 .6rem}
.sec-label:first-child{margin-top:0}
a{color:var(--blue);text-decoration:none}
a:hover{text-decoration:underline}
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-thumb{background:#252525;border-radius:2px}

@media(min-width:580px){
  .kpi-grid{grid-template-columns:repeat(3,1fr)}
  .filters{grid-template-columns:repeat(4,1fr)}
  .filter-full{grid-column:auto}
}
@media(min-width:860px){.kpi-grid{grid-template-columns:repeat(4,1fr)}}
</style>
</head>
<body>

<!-- Setup overlay -->
<div class="overlay" id="overlaySetup">
  <div class="setup-box">
    <h2>⚙️ Configurar conexión</h2>
    <p>Ingresá las credenciales de Supabase. Se guardan en <code>localStorage</code> del browser, nunca en un servidor.</p>
    <div class="form-group">
      <label>Supabase URL</label>
      <input type="text" id="inUrl" placeholder="https://xxxxx.supabase.co">
    </div>
    <div class="form-group">
      <label>Supabase Anon Key (o Service Role Key para acceso total)</label>
      <input type="text" id="inKey" placeholder="eyJhbGciOi...">
    </div>
    <button class="btn btn-success btn-full" onclick="saveSetup()">Conectar →</button>
  </div>
</div>

<!-- Lead modal overlay -->
<div class="overlay" id="overlayLead" onclick="if(event.target===this)closeLead()">
  <div class="modal-box">
    <div class="modal-head">
      <h3 id="mLeadTitle">Lead</h3>
      <button class="modal-close" onclick="closeLead()">✕</button>
    </div>
    <div class="modal-body" id="mLeadBody"></div>
  </div>
</div>

<!-- Toasts -->
<div class="toast-wrap" id="toasts"></div>

<!-- App -->
<div id="app" style="display:none">

  <!-- Header -->
  <header class="app-header">
    <div>
      <div class="header-brand">🤖 LinkedIn Agent</div>
      <div class="header-sub" id="hSub">Conectando...</div>
    </div>
    <div class="header-right">
      <button class="btn btn-ghost btn-sm" onclick="reloadTab()" title="Actualizar">↻</button>
      <button class="btn btn-ghost btn-sm" onclick="openSetup()" title="Configurar">⚙️</button>
    </div>
  </header>

  <!-- Tab nav -->
  <nav class="tab-nav">
    <button class="tab-btn active" data-t="msgs" onclick="go('msgs')">📨 Mensajes</button>
    <button class="tab-btn" data-t="pipe" onclick="go('pipe')">📊 Pipeline</button>
    <button class="tab-btn" data-t="leads" onclick="go('leads')">👥 Leads</button>
    <button class="tab-btn" data-t="kpis" onclick="go('kpis')">📈 KPIs</button>
    <button class="tab-btn" data-t="reps" onclick="go('reps')">📋 Reportes</button>
    <button class="tab-btn" data-t="imp" onclick="go('imp')">📥 Importar</button>
  </nav>

  <!-- TAB: Mensajes -->
  <div class="tab-pane active" id="t-msgs">
    <div id="msgsOut"><div class="loading"><div class="spin"></div>Cargando...</div></div>
  </div>

  <!-- TAB: Pipeline -->
  <div class="tab-pane" id="t-pipe">
    <div id="pipeOut"><div class="loading"><div class="spin"></div>Cargando...</div></div>
  </div>

  <!-- TAB: Leads -->
  <div class="tab-pane" id="t-leads">
    <div class="filters">
      <div><select id="fVert" onchange="filterLeads()">
        <option value="">Vertical (todos)</option>
        <option value="ecommerce">e-Commerce</option>
        <option value="real_estate">Real Estate</option>
        <option value="salud">Salud</option>
        <option value="saas">SaaS</option>
        <option value="gastronomia">Gastronomía</option>
      </select></div>
      <div><select id="fStat" onchange="filterLeads()">
        <option value="">Estado (todos)</option>
        <option value="NEW">NEW</option>
        <option value="ANALYZED">ANALYZED</option>
        <option value="ACTIVE">ACTIVE</option>
        <option value="RESPONDED">RESPONDED</option>
      </select></div>
      <div><select id="fStage" onchange="filterLeads()">
        <option value="">Etapa (todos)</option>
        <option value="PROSPECTADO">Prospectado</option>
        <option value="CONTACTADO">Contactado</option>
        <option value="EN_CONVERSACION">En conversación</option>
        <option value="PROPUESTA_ENVIADA">Propuesta enviada</option>
        <option value="NEGOCIACION">Negociación</option>
        <option value="CERRADO_GANADO">Cerrado ✅</option>
        <option value="CERRADO_PERDIDO">Perdido ❌</option>
      </select></div>
      <div><select id="fSort" onchange="filterLeads()">
        <option value="score">Ordenar: Score</option>
        <option value="name">Ordenar: Nombre</option>
        <option value="date">Ordenar: Fecha</option>
        <option value="company">Ordenar: Empresa</option>
      </select></div>
      <div class="filter-full"><input type="text" id="fSearch" placeholder="🔍 Buscar por nombre o empresa..." oninput="filterLeads()"></div>
    </div>
    <div id="leadsOut"><div class="loading"><div class="spin"></div>Cargando...</div></div>
  </div>

  <!-- TAB: KPIs -->
  <div class="tab-pane" id="t-kpis">
    <div class="date-btns">
      <button class="dbt" onclick="kpiPreset('today')">Hoy</button>
      <button class="dbt" onclick="kpiPreset('week')">Esta semana</button>
      <button class="dbt active" id="dbt-month" onclick="kpiPreset('month')">Este mes</button>
      <button class="dbt" onclick="kpiPreset('all')">Todo</button>
    </div>
    <div class="date-range">
      <input type="date" id="kFrom" onchange="kpiPreset('custom')">
      <span style="color:var(--muted);font-size:.8rem">→</span>
      <input type="date" id="kTo" onchange="kpiPreset('custom')">
    </div>
    <div id="kpisOut"><div class="loading"><div class="spin"></div>Calculando...</div></div>
  </div>

  <!-- TAB: Reportes -->
  <div class="tab-pane" id="t-reps">
    <div style="display:flex;justify-content:flex-end;margin-bottom:.875rem">
      <button class="btn btn-primary" onclick="genReport()">+ Generar reporte</button>
    </div>
    <div id="repsOut"><div class="loading"><div class="spin"></div>Cargando...</div></div>
  </div>

  <!-- TAB: Importar -->
  <div class="tab-pane" id="t-imp">

    <div class="import-sec">
      <div class="import-sec-title">📊 Opción A — Google Sheet</div>
      <div class="card" style="margin-bottom:0">
        <div class="form-group">
          <label>URL del Google Sheet público</label>
          <input type="text" id="sheetUrl" placeholder="https://docs.google.com/spreadsheets/d/...">
        </div>
        <button class="btn btn-ghost btn-full" id="btnSync" onclick="syncSheet()">🔄 Sincronizar desde Google Sheet</button>
        <div id="sheetPrev" style="margin-top:.75rem"></div>
      </div>
    </div>

    <div class="import-sec">
      <div class="import-sec-title">📄 Opción B — CSV manual</div>
      <div class="card" style="margin-bottom:0">
        <div class="form-group">
          <label>Pegá los datos en formato CSV</label>
          <textarea id="csvIn" placeholder="first_name,last_name,title,company,industry,location,linkedin_url,website,employee_count
Juan,García,CEO,Mi Empresa,ecommerce,CDMX,https://linkedin.com/in/juangarcia,,50"></textarea>
        </div>
        <div style="display:flex;gap:.45rem">
          <button class="btn btn-ghost" onclick="prevCSV()">👁 Preview</button>
          <button class="btn btn-primary" id="btnImpCSV" style="display:none" onclick="doImportCSV()">⬆️ Importar</button>
        </div>
        <div id="csvPrev" style="margin-top:.75rem"></div>
      </div>
    </div>

  </div>

</div><!-- /app -->

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
// ═══════════════════════════════════════
// STATE
// ═══════════════════════════════════════
let sb = null;
let cur = 'msgs';
let allLeads = [];
let csvRows = [];
let sheetRows = [];
let kpiRange = { from: null, to: null };

const STAGES = [
  {id:'PROSPECTADO',      label:'Prospectado',        color:'#6b7280'},
  {id:'CONTACTADO',       label:'Contactado',         color:'#3b82f6'},
  {id:'EN_CONVERSACION',  label:'En conversación',    color:'#8b5cf6'},
  {id:'PROPUESTA_ENVIADA',label:'Propuesta enviada',  color:'#f59e0b'},
  {id:'NEGOCIACION',      label:'Negociación',        color:'#f97316'},
  {id:'CERRADO_GANADO',   label:'Cerrado ✅',          color:'#10b981'},
  {id:'CERRADO_PERDIDO',  label:'Perdido ❌',          color:'#ef4444'},
];
const MAX_CH = {1:300, 2:500, 3:400, 4:250};
const STEP_LBL = {1:'📨 Conexión', 2:'💬 Paso 2', 3:'💬 Paso 3', 4:'👋 Paso 4'};

// ═══════════════════════════════════════
// SETUP
// ═══════════════════════════════════════
function initSB() {
  const url = localStorage.getItem('sb_url');
  const key = localStorage.getItem('sb_key');
  if (!url || !key) { document.getElementById('overlaySetup').classList.add('show'); return false; }
  sb = supabase.createClient(url, key);
  document.getElementById('app').style.display = 'block';
  document.getElementById('overlaySetup').classList.remove('show');
  return true;
}
function saveSetup() {
  const url = Q('inUrl').value.trim();
  const key = Q('inKey').value.trim();
  if (!url || !key) { toast('Completá ambos campos','e'); return; }
  localStorage.setItem('sb_url', url); localStorage.setItem('sb_key', key);
  initSB(); bootApp();
}
function openSetup() {
  Q('inUrl').value = localStorage.getItem('sb_url')||'';
  Q('inKey').value = localStorage.getItem('sb_key')||'';
  Q('overlaySetup').classList.add('show');
}

// ═══════════════════════════════════════
// TOAST
// ═══════════════════════════════════════
function toast(msg, type='i') {
  const el = document.createElement('div');
  el.className = `toast ${type}`;
  el.textContent = msg;
  Q('toasts').appendChild(el);
  setTimeout(() => el.remove(), 3200);
}

// ═══════════════════════════════════════
// TABS
// ═══════════════════════════════════════
function go(t) {
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.toggle('active', b.dataset.t === t));
  document.querySelectorAll('.tab-pane').forEach(p => p.classList.toggle('active', p.id === `t-${t}`));
  cur = t;
  loadTab(t);
}
function reloadTab() { loadTab(cur); }
function loadTab(t) {
  if (!sb) return;
  if (t==='msgs')  loadMsgs();
  if (t==='pipe')  loadPipe();
  if (t==='leads') loadLeads();
  if (t==='kpis')  loadKPIs();
  if (t==='reps')  loadReps();
  if (t==='imp')   initImp();
}

// ═══════════════════════════════════════
// TAB 1 — MENSAJES
// ═══════════════════════════════════════
async function loadMsgs() {
  Q('msgsOut').innerHTML = spin();
  const {data, error} = await sb.from('messages')
    .select('id,lead_id,outreach_id,step_number,message_type,body,char_count,status')
    .eq('status','DRAFT');
  if (error) { Q('msgsOut').innerHTML = err(error.message); return; }
  if (!data?.length) { Q('msgsOut').innerHTML = '<div class="empty">No hay mensajes pendientes.<br>Importá leads y ejecutá generate-messages.</div>'; updateSub(); return; }

  // Batch-fetch leads
  const ids = [...new Set(data.map(m=>m.lead_id))];
  const {data: leads} = await sb.from('leads').select('id,first_name,last_name,title,company,industry,vertical,location,linkedin_url,priority_score,sales_stage').in('id', ids);
  const lmap = Object.fromEntries((leads||[]).map(l=>[l.id,l]));
  data.forEach(m => { m._lead = lmap[m.lead_id] || {}; });
  data.sort((a,b)=>(b._lead.priority_score||0)-(a._lead.priority_score||0));

  Q('msgsOut').innerHTML = `<div style="font-size:.75rem;color:var(--muted);margin-bottom:.75rem;font-weight:600">${data.length} mensajes para enviar hoy</div>` + data.map(msgCard).join('');
  updateSub();
}

function msgCard(m) {
  const l = m._lead;
  const mx = MAX_CH[m.step_number]||500;
  const ch = m.char_count || m.body?.length || 0;
  const sl = STEP_LBL[m.step_number]||`Paso ${m.step_number}`;
  const sc = l.priority_score>=8?'bg':l.priority_score>=5?'by':'br';
  return `<div class="card msg-card" id="mc-${m.id}">
    <div class="msg-header">
      <div style="display:flex;align-items:center;gap:.5rem;flex-wrap:wrap">
        <span class="msg-name">${x(l.first_name)} ${x(l.last_name)}</span>
        ${l.linkedin_url?`<a href="${x(l.linkedin_url)}" target="_blank" style="font-size:.73rem">🔗 LinkedIn</a>`:''}
      </div>
      <div class="msg-role">${x(l.title||'')}${l.title&&l.company?' · ':''}${x(l.company||'')}</div>
    </div>
    <div class="msg-badges">
      <span class="badge ${sc}">⭐ ${l.priority_score??'?'}/10</span>
      ${l.vertical?`<span class="badge">${x(l.vertical)}</span>`:''}
      ${l.location?`<span class="badge">${x(l.location)}</span>`:''}
      <span class="badge bb">${sl}</span>
    </div>
    <div class="msg-body">${x(m.body||'')}</div>
    <div class="msg-footer">
      <span class="char-info ${ch>mx?'char-over':''}">${ch}/${mx} chars</span>
      <div class="msg-actions">
        <button class="btn btn-ghost btn-sm" onclick="copyMsg('mc-${m.id}')">📋 Copiar</button>
        <button class="btn btn-success btn-sm" onclick="sendMsg('${m.id}',${m.step_number},'${m.lead_id}','${m.outreach_id||''}')">✅ Enviado</button>
        <button class="btn btn-danger btn-sm" onclick="discardMsg('${m.id}')">❌ Descartar</button>
      </div>
    </div>
  </div>`;
}

async function copyMsg(cardId) {
  const body = document.querySelector(`#${cardId} .msg-body`)?.textContent||'';
  try { await navigator.clipboard.writeText(body); toast('✅ Copiado','s'); }
  catch { toast('Error al copiar','e'); }
}

async function sendMsg(mid, step, lid, oid) {
  const now = new Date().toISOString();
  await sb.from('messages').update({status:'SENT', sent_at:now}).eq('id',mid);
  if (oid) {
    const upd = {};
    if (step===1) { upd.connection_sent_at=now; upd.current_step=1; upd.next_action='WAIT_ACCEPTANCE'; upd.next_action_date=now.slice(0,10); }
    if (step===2) { upd.step2_sent_at=now; upd.current_step=2; upd.next_action='WAIT_RESPONSE'; }
    if (step===3) { upd.step3_sent_at=now; upd.current_step=3; }
    if (step===4) { upd.step4_sent_at=now; upd.current_step=4; }
    if (Object.keys(upd).length) await sb.from('outreach').update(upd).eq('id',oid);
  }
  if (step===1) await sb.from('leads').update({sales_stage:'CONTACTADO'}).eq('id',lid);
  const card = document.getElementById(`mc-${mid}`);
  if (card) { card.style.opacity='.4'; setTimeout(()=>card.remove(),350); }
  toast('✅ Marcado como enviado','s');
  setTimeout(updateSub, 400);
}

async function discardMsg(mid) {
  await sb.from('messages').update({status:'DISCARDED'}).eq('id',mid);
  const card = document.getElementById(`mc-${mid}`);
  if (card) card.remove();
  toast('Mensaje descartado','i');
}

async function loadPipe() {
  Q('pipeOut').innerHTML = spin();
  const {data: leads, error} = await sb.from('leads')
    .select('id,first_name,last_name,company,priority_score,sales_stage,vertical,outreach(id,connection_accepted,current_step)')
    .order('priority_score',{ascending:false});
  if (error) { Q('pipeOut').innerHTML = err(error.message); return; }

  const byStage = {};
  STAGES.forEach(s => { byStage[s.id]=[]; });
  (leads||[]).forEach(l => {
    const s = l.sales_stage||'PROSPECTADO';
    if (!byStage[s]) byStage[s]=[];
    byStage[s].push(l);
  });

  Q('pipeOut').innerHTML = `<div class="kanban-scroll"><div class="kanban">
    ${STAGES.map((s,i) => `
      <div class="k-col">
        <div class="k-col-head" style="background:${s.color}1f;color:${s.color}">
          <span>${s.label}</span>
          <span class="k-cnt">${byStage[s.id]?.length||0}</span>
        </div>
        <div class="k-cards">
          ${(byStage[s.id]||[]).map(l=>kCard(l,i,s.id)).join('')}
        </div>
      </div>`).join('')}
  </div></div>`;
}

function kCard(l, idx, sid) {
  const out = Array.isArray(l.outreach) ? l.outreach[0] : l.outreach;
  const sc = l.priority_score>=8?'var(--green)':l.priority_score>=5?'var(--yellow)':'var(--muted)';
  const prev = idx>0 ? STAGES[idx-1] : null;
  const next = idx<STAGES.length-1 ? STAGES[idx+1] : null;
  const showAccept = sid==='CONTACTADO' && out && !out.connection_accepted;
  return `<div class="k-card" id="kc-${l.id}">
    <div class="k-name">${x(l.first_name)} ${x(l.last_name)}</div>
    <div class="k-co">${x(l.company||'')}${l.vertical?' · '+l.vertical:''}</div>
    <div style="font-size:.7rem;color:${sc};margin-bottom:.4rem">⭐ ${l.priority_score??'?'}/10</div>
    <div class="k-acts">
      ${prev?`<button class="btn btn-ghost btn-sm" onclick="mvStage('${l.id}','${prev.id}',${idx-1})">← ${prev.label.split(' ')[0]}</button>`:''}
      ${next?`<button class="btn btn-ghost btn-sm" onclick="mvStage('${l.id}','${next.id}',${idx+1})">${next.label.split(' ')[0]} →</button>`:''}
      ${showAccept?`<button class="btn btn-success btn-sm" onclick="acceptConn('${l.id}','${out.id}')">🤝 Aceptó</button>`:''}
    </div>
  </div>`;
}

async function mvStage(lid, sid, idx) {
  await sb.from('leads').update({sales_stage:sid}).eq('id',lid);
  toast(`Movido a ${STAGES[idx]?.label}`,'s');
  loadPipe();
}

async function acceptConn(lid, oid) {
  const d3 = new Date(); d3.setDate(d3.getDate()+3);
  await sb.from('outreach').update({
    connection_accepted:true, connection_accepted_at:new Date().toISOString(),
    next_action:'SEND_STEP_2', next_action_date:d3.toISOString().slice(0,10), current_step:1,
  }).eq('id',oid);
  await sb.from('leads').update({sales_stage:'EN_CONVERSACION'}).eq('id',lid);
  toast('🎉 Conexión aceptada! Paso 2 en 3 días','s');
  loadPipe();
}

async function loadLeads() {

function filterLeads() {
  const vt = Q('fVert')?.value||'';
  const st = Q('fStat')?.value||'';
  const sg = Q('fStage')?.value||'';
  const so = Q('fSort')?.value||'score';
  const sr = (Q('fSearch')?.value||'').toLowerCase();

  let rows = allLeads.filter(l => {
    if (vt && l.vertical!==vt) return false;
    if (st && l.status!==st) return false;
    if (sg && l.sales_stage!==sg) return false;
    if (sr && !`${l.first_name} ${l.last_name} ${l.company}`.toLowerCase().includes(sr)) return false;
    return true;
  });

  rows.sort((a,b)=>{
    if (so==='score') return (b.priority_score||0)-(a.priority_score||0);
    if (so==='name')  return (a.first_name||'').localeCompare(b.first_name||'');
    if (so==='date')  return new Date(b.created_at)-new Date(a.created_at);
    if (so==='company') return (a.company||'').localeCompare(b.company||'');
    return 0;
  });

  if (!rows.length) { Q('leadsOut').innerHTML = '<div class="empty">Sin resultados para esos filtros.</div>'; return; }

  Q('leadsOut').innerHTML = `
    <div style="font-size:.73rem;color:var(--muted);margin-bottom:.5rem">${rows.length} leads</div>
    <div class="tbl-wrap"><table>
      <thead><tr>
        <th onclick="setSortLeads('name')">Nombre</th>
        <th onclick="setSortLeads('company')">Cargo · Empresa</th>
        <th>Vertical</th>
        <th onclick="setSortLeads('score')">Score</th>
        <th>Estado</th>
        <th>Etapa</th>
        <th onclick="setSortLeads('date')">Fecha</th>
      </tr></thead>
      <tbody>${rows.map(l=>`
        <tr class="row" onclick="openLead('${l.id}')">
          <td>${x(l.first_name)} ${x(l.last_name)}</td>
          <td style="color:var(--muted)">${x(l.title||'')}${l.title&&l.company?' · ':''}${x(l.company||'')}</td>
          <td>${l.vertical?`<span class="badge">${l.vertical}</span>`:'-'}</td>
          <td><b style="color:${sCol(l.priority_score)}">${l.priority_score??'-'}</b></td>
          <td><span class="badge">${l.status||'-'}</span></td>
          <td style="color:var(--muted);font-size:.72rem">${l.sales_stage||'-'}</td>
          <td style="color:var(--muted);font-size:.72rem">${l.created_at?.slice(0,10)||'-'}</td>
        </tr>`).join('')}
      </tbody>
    </table></div>`;
}

function kpiPreset(p) {
  document.querySelectorAll('.dbt').forEach(b=>b.classList.remove('active'));
  const now = new Date();
  if (p==='today')  { kpiRange.from=kpiRange.to=now.toISOString().slice(0,10); }
  else if (p==='week')  { const d=new Date(now);d.setDate(d.getDate()-7);kpiRange.from=d.toISOString().slice(0,10);kpiRange.to=now.toISOString().slice(0,10); }
  else if (p==='month') { const d=new Date(now);d.setDate(d.getDate()-30);kpiRange.from=d.toISOString().slice(0,10);kpiRange.to=now.toISOString().slice(0,10); }
  else if (p==='all')   { kpiRange.from=null;kpiRange.to=null; }
  else if (p==='custom'){ kpiRange.from=Q('kFrom').value||null;kpiRange.to=Q('kTo').value||null; }
  const btn = document.querySelector(`[onclick="kpiPreset('${p}')"]`);
  if (btn) btn.classList.add('active');
  if (kpiRange.from) Q('kFrom').value=kpiRange.from;
  if (kpiRange.to)   Q('kTo').value=kpiRange.to;
  if (sb) loadKPIs();
}

async function loadKPIs() {
  if (!sb) return;
  Q('kpisOut').innerHTML = spin();

  function addRange(q, col='created_at') {
    if (kpiRange.from) q = q.gte(col, kpiRange.from+'T00:00:00');
    if (kpiRange.to)   q = q.lte(col, kpiRange.to+'T23:59:59');
    return q;
  }

  const [{data:leads},{data:outs},{data:msgs}] = await Promise.all([
    addRange(sb.from('leads').select('id,created_at,sales_stage,status')),
    addRange(sb.from('outreach').select('id,connection_sent_at,connection_accepted')),
    addRange(sb.from('messages').select('id,step_number,status,sent_at,created_at')),
  ]);

  const total   = leads?.length||0;
  const cSent   = outs?.filter(o=>o.connection_sent_at)?.length||0;
  const cAcc    = outs?.filter(o=>o.connection_accepted)?.length||0;
  const cRate   = cSent>0?Math.round(cAcc/cSent*100):0;
  const mSent   = msgs?.filter(m=>m.status==='SENT')?.length||0;
  const respond = leads?.filter(l=>l.status==='RESPONDED')?.length||0;
  const rRate   = mSent>0?Math.round(respond/mSent*100):0;
  const props   = leads?.filter(l=>['PROPUESTA_ENVIADA','NEGOCIACION','CERRADO_GANADO'].includes(l.sales_stage))?.length||0;
  const closed  = leads?.filter(l=>l.sales_stage==='CERRADO_GANADO')?.length||0;
  const comision= props*270*0.30;

  // Activity by day
  const days=['Dom','Lun','Mar','Mié','Jue','Vie','Sáb'];
  const byDay=[0,0,0,0,0,0,0];
  msgs?.filter(m=>m.status==='SENT'&&m.sent_at).forEach(m=>{ byDay[new Date(m.sent_at).getDay()]++; });
  const mx = Math.max(...byDay,1);

  // Funnel (all-time)
  const {data:allL} = await sb.from('leads').select('sales_stage');
  const sc={};STAGES.forEach(s=>{sc[s.id]=0;});
  allL?.forEach(l=>{ if(sc[l.sales_stage]!==undefined)sc[l.sales_stage]++; });
  const fStages=['PROSPECTADO','CONTACTADO','EN_CONVERSACION','PROPUESTA_ENVIADA','CERRADO_GANADO'];
  const ftop=sc['PROSPECTADO']||1;

  Q('kpisOut').innerHTML = `
    <div class="kpi-grid">
      ${kc('Total importados',total,'','var(--text)')}
      ${kc('Conexiones enviadas',cSent,'','var(--blue)')}
      ${kc('Conexiones aceptadas',cAcc,cRate+'% tasa','var(--green)')}
      ${kc('Mensajes enviados',mSent,'','var(--text)')}
      ${kc('Respuestas',respond,rRate+'% tasa','var(--purple)')}
      ${kc('Propuestas',props,'','var(--yellow)')}
      ${kc('Deals cerrados',closed,'','var(--green)')}
      ${kc('Comisiones proj.','$'+comision.toFixed(0),'USD · pipeline×30%','var(--yellow)')}
    </div>

    <div class="chart-title">Actividad por día (mensajes enviados)</div>
    <div class="bars">${byDay.map((v,i)=>`
      <div class="bar-col">
        <div class="bar-fill" style="height:${Math.round(v/mx*64)+2}px" title="${v}"></div>
        <div class="bar-lbl">${days[i]}</div>
      </div>`).join('')}
    </div>

    <div class="chart-title">Funnel de conversión (histórico completo)</div>
    <div class="funnel-wrap">${fStages.map((sid,i)=>{
      const count=sc[sid]||0;
      const label=STAGES.find(s=>s.id===sid)?.label||sid;
      const color=STAGES.find(s=>s.id===sid)?.color||'var(--green)';
      const pct=i>0?Math.round(count/(sc[fStages[i-1]]||1)*100):100;
      const wp=Math.max(Math.round(count/ftop*100),4);
      return `<div class="funnel-row">
        <div class="f-label">${label}</div>
        <div class="f-bar-wrap"><div class="f-bar" style="width:${wp}%;background:${color}">${count}</div></div>
        <div class="f-pct">${i>0?pct+'%':''}</div>
      </div>`;
    }).join('')}</div>
  `;
}
function kc(label,val,sub,color) {
  return `<div class="kpi-card"><div class="kpi-v" style="color:${color}">${val}</div><div class="kpi-l">${label}</div>${sub?`<div class="kpi-s">${sub}</div>`:''}</div>`;
}

async function genReport() {
  const to=new Date(), from=new Date();
  from.setDate(from.getDate()-30);
  const f=from.toISOString().slice(0,10), t=to.toISOString().slice(0,10);

  const [{data:leads},{data:outs},{data:msgs}] = await Promise.all([
    sb.from('leads').select('id,sales_stage,status').gte('created_at',f+'T00:00:00'),
    sb.from('outreach').select('connection_sent_at,connection_accepted').gte('created_at',f+'T00:00:00'),
    sb.from('messages').select('status').eq('status','SENT').gte('created_at',f+'T00:00:00'),
  ]);

  const cSent=outs?.filter(o=>o.connection_sent_at)?.length||0;
  const cAcc=outs?.filter(o=>o.connection_accepted)?.length||0;
  const closed=leads?.filter(l=>l.sales_stage==='CERRADO_GANADO')?.length||0;

  const {error} = await sb.from('reports').insert({
    report_type:'mensual',
    period_start:f, period_end:t,
    data:{
      'Leads importados':leads?.length||0,
      'Conexiones enviadas':cSent,
      'Aceptadas':cAcc,
      'Tasa aceptación':cSent>0?Math.round(cAcc/cSent*100)+'%':'0%',
      'Mensajes enviados':msgs?.length||0,
      'Deals cerrados':closed,
      'Comisiones USD':((closed*270*0.30).toFixed(0)),
    },
  });
  if (error) { toast(`Error: ${error.message}`,'e'); return; }
  toast('Reporte generado ✅','s');
  loadReps();
}

// ═══════════════════════════════════════
// TAB 6 — IMPORTAR
// ═══════════════════════════════════════
function initImp() {
  const inp = Q('sheetUrl');
  if (!inp.value) inp.value = localStorage.getItem('sheet_url')||'https://docs.google.com/spreadsheets/d/1AhbaEaTXN90eqdouwjQ6edI_bWOgrvOJdPzQcVV3Ccc/edit?usp=sharing';
}

async function syncSheet() {
  const raw = Q('sheetUrl').value.trim();
  const m = raw.match(/\/d\/([a-zA-Z0-9_-]+)/);
  if (!m) { toast('URL de Sheet inválida','e'); return; }
  localStorage.setItem('sheet_url', raw);
  const csvUrl = `https://docs.google.com/spreadsheets/d/${m[1]}/gviz/tq?tqx=out:csv`;
  const btn=Q('btnSync'); btn.textContent='⏳ Leyendo...'; btn.disabled=true;
  try {
    const res=await fetch(csvUrl);
    if (!res.ok) throw new Error('HTTP '+res.status);
    const rows=parseCSV(await res.text());
    if (rows.length<2) { Q('sheetPrev').innerHTML='<div class="empty">Sheet vacío o solo header.</div>'; return; }
    const [hdr,...data]=rows;
    const parsed=data.map(r=>{const o={};hdr.forEach((h,i)=>{o[h.trim()]=r[i]?.trim()||'';});return o;})
      .filter(r=>r.first_name&&r.last_name&&r.linkedin_url);

    const {data:ex}=await sb.from('leads').select('linkedin_url');
    const exSet=new Set((ex||[]).map(e=>e.linkedin_url?.toLowerCase()));
    sheetRows=parsed.filter(r=>!exSet.has(r.linkedin_url?.toLowerCase()));
    const dups=parsed.length-sheetRows.length;

    Q('sheetPrev').innerHTML = `
      <div class="preview-info">📊 ${parsed.length} filas · <b>${sheetRows.length} nuevas</b> · ${dups} duplicadas</div>
      ${sheetRows.length?`
        <div class="tbl-wrap"><table>
          <thead><tr><th>Nombre</th><th>Empresa</th><th>Cargo</th><th>Ubicación</th></tr></thead>
          <tbody>${sheetRows.slice(0,6).map(r=>`<tr><td>${x(r.first_name)} ${x(r.last_name)}</td><td>${x(r.company||'-')}</td><td>${x(r.title||'-')}</td><td>${x(r.location||'-')}</td></tr>`).join('')}
          ${sheetRows.length>6?`<tr><td colspan="4" style="color:var(--muted)">...y ${sheetRows.length-6} más</td></tr>`:''}
          </tbody>
        </table></div>
        <button class="btn btn-success btn-full" style="margin-top:.75rem" onclick="doSheetImport()">✅ Confirmar importación (${sheetRows.length} leads)</button>
      `:'<div class="empty">No hay leads nuevos para importar.</div>'}`;
  } catch(e) { toast('Error: '+e.message,'e'); }
  finally { btn.textContent='🔄 Sincronizar desde Google Sheet'; btn.disabled=false; }
}

async function doSheetImport() {
  if (!sheetRows.length) return;
  const rows=sheetRows.map(r=>mkLead(r,'google_sheet'));
  const {error}=await sb.from('leads').insert(rows);
  if (error) { toast('Error: '+error.message,'e'); return; }
  toast(`✅ ${rows.length} leads importados`,'s');
  sheetRows=[];
  Q('sheetPrev').innerHTML=`<div class="preview-info success">✅ ${rows.length} leads importados correctamente</div>`;
}

function prevCSV() {
  const raw=Q('csvIn').value.trim();
  if (!raw) { toast('Pegá datos CSV primero','e'); return; }
  const rows=parseCSV(raw);
  if (rows.length<2) { toast('CSV sin datos','e'); return; }
  const [hdr,...data]=rows;
  csvRows=data.map(r=>{const o={};hdr.forEach((h,i)=>{o[h.trim()]=r[i]?.trim()||'';});return o;})
    .filter(r=>r.first_name&&r.last_name&&r.linkedin_url);
  if (!csvRows.length) { Q('csvPrev').innerHTML='<div class="empty">Sin filas válidas (requieren first_name, last_name, linkedin_url).</div>'; Q('btnImpCSV').style.display='none'; return; }
  Q('csvPrev').innerHTML=`
    <div class="preview-info">${csvRows.length} filas válidas</div>
    <div class="tbl-wrap"><table>
      <thead><tr><th>Nombre</th><th>Empresa</th><th>Cargo</th><th>LinkedIn</th></tr></thead>
      <tbody>${csvRows.slice(0,5).map(r=>`<tr><td>${x(r.first_name)} ${x(r.last_name)}</td><td>${x(r.company||'-')}</td><td>${x(r.title||'-')}</td><td style="font-size:.7rem;color:var(--muted)">${x(r.linkedin_url)}</td></tr>`).join('')}
      ${csvRows.length>5?`<tr><td colspan="4" style="color:var(--muted)">...y ${csvRows.length-5} más</td></tr>`:''}
      </tbody></table></div>`;
  Q('btnImpCSV').style.display='';
}

async function doImportCSV() {
  if (!csvRows.length) return;
  const rows=csvRows.map(r=>mkLead(r,'csv_manual'));
  const {error}=await sb.from('leads').insert(rows);
  if (error) { toast('Error: '+error.message,'e'); return; }
  toast(`✅ ${rows.length} leads importados`,'s');
  csvRows=[]; Q('csvIn').value=''; Q('csvPrev').innerHTML=`<div class="preview-info success">✅ ${rows.length} leads importados correctamente</div>`; Q('btnImpCSV').style.display='none';
}

function mkLead(r, source) {
  return {
    first_name:r.first_name, last_name:r.last_name,
    title:r.title||null, company:r.company||null,
    industry:r.industry||null, location:r.location||null,
    linkedin_url:r.linkedin_url, website:r.website||null,
    employee_count:r.employee_count?parseInt(r.employee_count)||null:null,
    status:'NEW', source, sales_stage:'PROSPECTADO',
  };
}

// ═══════════════════════════════════════
// CSV PARSER
// ═══════════════════════════════════════
function parseCSV(text) {
  const rows=[];
  for (const line of text.replace(/\r\n/g,'\n').replace(/\r/g,'\n').split('\n')) {
    if (!line.trim()) continue;
    const fields=[];let i=0;
    while(i<line.length){
      if(line[i]==='"'){let v='';i++;
        while(i<line.length){if(line[i]==='"'&&line[i+1]==='"'){v+='"';i+=2;}else if(line[i]==='"'){i++;break;}else v+=line[i++];}
        fields.push(v);if(line[i]===',')i++;
      }else{const e=line.indexOf(',',i);if(e<0){fields.push(line.slice(i).trim());break;}fields.push(line.slice(i,e).trim());i=e+1;}
    }
    rows.push(fields);
  }
  return rows;
}

// ═══════════════════════════════════════
// REALTIME
// ═══════════════════════════════════════
function setupRT() {
  sb.channel('dash-rt')
    .on('postgres_changes',{event:'*',schema:'public',table:'leads'},()=>{ if(cur==='leads'||cur==='pipe') loadTab(cur); })
    .on('postgres_changes',{event:'*',schema:'public',table:'messages'},()=>{ if(cur==='msgs') loadMsgs(); })
    .subscribe();
}

// ═══════════════════════════════════════
// UTILS
// ═══════════════════════════════════════
function Q(id) { return document.getElementById(id); }
function x(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function sCol(s) { return s>=8?'var(--green)':s>=5?'var(--yellow)':'var(--red)'; }
function spin() { return '<div class="loading"><div class="spin"></div>Cargando...</div>'; }
function err(m) { return `<div class="empty">Error: ${x(m)}</div>`; }

async function updateSub() {
  if (!sb) return;
  const [{count:lc},{count:mc}] = await Promise.all([
    sb.from('leads').select('*',{count:'exact',head:true}),
    sb.from('messages').select('*',{count:'exact',head:true}).eq('status','DRAFT'),
  ]);
  Q('hSub').textContent = `${lc||0} leads · ${mc||0} mensajes pendientes`;
}

// ═══════════════════════════════════════
// BOOT
// ═══════════════════════════════════════
async function bootApp() {
  kpiPreset('month');
  loadMsgs();
  setupRT();
  updateSub();
}

window.addEventListener('DOMContentLoaded', () => {
  if (initSB()) bootApp();
});
</script>
